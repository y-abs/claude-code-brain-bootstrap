name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Template Validation (120 checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify jq is available
        run: jq --version

      - name: Run validate.sh
        run: bash claude/scripts/validate.sh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

  links:
    name: Documentation Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --include-fragments
            '*.md'
            'claude/**/*.md'
            '.github/**/*.md'
          fail: true
